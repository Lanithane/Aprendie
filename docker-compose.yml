services:
  postgres:
    image: postgres:17-alpine
    container_name: gac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guess_and_correct
    ports:
      - '5432:5432'
    volumes:
      - gac_pg_data:/var/lib/postgresql/data

volumes:
  gac_pg_data:
